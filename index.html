<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亀裂装備強化シミュレーター v1.3.1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.4);
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // アイコンコンポーネント: 複数のパスを持つアイコンをFragmentでラップするように修正
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                sword: <path d="m14.5 17.5-2.5 2.5-2.5-2.5 2.5-2.5 2.5 2.5ZM10 10l5 5M6 14l3 3M14 6l3 3M3 21l3-3M16.5 4.5 19.5 7.5l-3 3-3-3 3-3Z"/>,
                gem: <path d="M6 3h12l4 6-10 12L2 9zM11 3v18M5 9h14M2 9l9 3 9-3"/>,
                coins: <React.Fragment><circle cx="8" cy="8" r="6"/><path d="M18 8c0 4.42-3.58 8-8 8"/><path d="M22 12c0 4.42-3.58 8-8 8"/><path d="M10 2v4"/><path d="M10 10v4"/><path d="M10 18v4"/><path d="M18 10h4"/></React.Fragment>,
                layers: <React.Fragment><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m2.6 12.08 8.58 3.9a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83"/><path d="m2.6 18.08 8.58 3.9a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83"/></React.Fragment>,
                skull: <React.Fragment><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M15 22a1 1 0 0 0 1-1v-1a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20v1a1 1 0 0 0 1 1z"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/></React.Fragment>,
                play: <path d="m7 4 12 8-12 8V4z"/>,
                square: <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>,
                rotate: <React.Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></React.Fragment>,
                wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>,
                alert: <React.Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></React.Fragment>,
                check: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></React.Fragment>,
                circle: <circle cx="12" cy="12" r="10"/>,
                info: <React.Fragment><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></React.Fragment>,
                book: <React.Fragment><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></React.Fragment>,
                target: <React.Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></React.Fragment>,
                user: <React.Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                ban: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 14.14 14.14"/></React.Fragment>
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const MIN_LEVEL = 15;
            const MAX_LEVEL = 40;

            const [level, setLevel] = useState(MIN_LEVEL);
            const [isBroken, setIsBroken] = useState(false); 
            const [showBreakDialog, setShowBreakDialog] = useState(false);
            const [useGemPriority, setUseGemPriority] = useState(true);
            const [isAutoMode, setIsAutoMode] = useState(false);
            const [autoRepair, setAutoRepair] = useState(false); 
            const [totalGems, setTotalGems] = useState(0);
            const [totalGold, setTotalGold] = useState(0);
            const [totalShards, setTotalShards] = useState(0);
            const [breakCount, setBreakCount] = useState(0); 
            const [logs, setLogs] = useState([]);
            const [status, setStatus] = useState({ message: '亀裂装備を強化してレベルを上げよう！', type: 'info' });
            const [isAnimating, setIsAnimating] = useState(false);

            const autoIntervalRef = useRef(null);

            const getProbabilities = (currentLevel, isGem) => {
                if (isGem) {
                    if (currentLevel >= 20 && currentLevel <= 24) return { success: 0.50, fail: 0.50, break: 0 };
                    if (currentLevel >= 25 && currentLevel <= 29) return { success: 0.40, fail: 0.60, break: 0 };
                    if (currentLevel >= 30 && currentLevel <= 32) return { success: 0.30, fail: 0.70, break: 0 };
                    return { success: 0, fail: 1, break: 0 };
                } else {
                    if (currentLevel >= 15 && currentLevel <= 19) return { success: 0.60, fail: 0.40, break: 0 };
                    if (currentLevel >= 20 && currentLevel <= 24) return { success: 0.50, fail: 0.48, break: 0.02 };
                    if (currentLevel >= 25 && currentLevel <= 29) return { success: 0.40, fail: 0.57, break: 0.03 };
                    if (currentLevel >= 30 && currentLevel <= 34) return { success: 0.30, fail: 0.66, break: 0.04 };
                    if (currentLevel >= 35 && currentLevel <= 39) return { success: 0.25, fail: 0.70, break: 0.05 };
                    return { success: 0, fail: 1, break: 0 };
                }
            };

            const getRequiredGems = (currentLevel) => {
                if (currentLevel >= 20 && currentLevel <= 24) return 10;
                if (currentLevel >= 25 && currentLevel <= 29) return 15;
                if (currentLevel >= 30 && currentLevel <= 32) return 30;
                return null;
            };

            const getRequiredGoldAndShards = (currentLevel) => {
                if (currentLevel >= 15 && currentLevel <= 19) return { gold: 350 + (currentLevel - 15) * 70, shards: 70 + (currentLevel - 15) * 14 };
                if (currentLevel >= 20 && currentLevel <= 24) return { gold: 1225 + (currentLevel - 20) * 175, shards: 245 + (currentLevel - 20) * 35 };
                if (currentLevel >= 25 && currentLevel <= 29) return { gold: 2450 + (currentLevel - 25) * 175, shards: 490 + (currentLevel - 25) * 35 };
                if (currentLevel >= 30 && currentLevel <= 34) return { gold: 4200 + (currentLevel - 30) * 175, shards: 840 + (currentLevel - 30) * 35 };
                if (currentLevel >= 35 && currentLevel <= 39) return { gold: 6300 + (currentLevel - 35) * 175, shards: 1260 + (currentLevel - 35) * 35 };
                return null;
            };

            const tableData = [];
            for (let i = 15; i < 40; i++) {
                const gem = getRequiredGems(i);
                const res = getRequiredGoldAndShards(i);
                const probNormal = getProbabilities(i, false);
                const probGem = getProbabilities(i, true);
                tableData.push({ level: i, gem, res, probNormal, probGem });
            }

            const handleRepair = () => {
                setIsBroken(false);
                setLevel(MIN_LEVEL);
                setStatus({ message: '不能状態を解除しました。Lv.15に戻ります。', type: 'info' });
                setLogs(prev => [{
                    id: Date.now(), type: 'repair', message: '不能解除 (Lv.15リセット)',
                    time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                }, ...prev]);
            };

            const executeEnhance = () => {
                if (level >= MAX_LEVEL) {
                    setIsAutoMode(false);
                    return;
                }

                if (isBroken) {
                    if (isAutoMode && autoRepair) {
                        handleRepair();
                        return;
                    } else {
                        setIsAutoMode(false);
                        return;
                    }
                }

                const currentGemCost = getRequiredGems(level);
                const currentResCosts = getRequiredGoldAndShards(level);
                const currentlyUsingGem = useGemPriority && currentGemCost !== null;

                let costInfo = '';
                if (currentlyUsingGem) {
                    setTotalGems(prev => prev + currentGemCost);
                    costInfo = `${currentGemCost}ジェム`;
                } else {
                    if (currentResCosts === null) {
                        setIsAutoMode(false);
                        return;
                    }
                    setTotalGold(prev => prev + currentResCosts.gold);
                    setTotalShards(prev => prev + currentResCosts.shards);
                    costInfo = `${currentResCosts.gold.toLocaleString()}G / ${currentResCosts.shards.toLocaleString()}個`;
                }

                setIsAnimating(true);
                setTimeout(() => setIsAnimating(false), 150);

                const probs = getProbabilities(level, currentlyUsingGem);
                const randomVal = Math.random();
                
                if (randomVal < probs.break) {
                    setIsBroken(true);
                    setBreakCount(prev => prev + 1);
                    if (!isAutoMode || !autoRepair) {
                        setShowBreakDialog(true);
                        setIsAutoMode(false);
                    }
                    setStatus({ message: '警告：装備が「不能」状態になりました！', type: 'broken' });
                    setLogs(prev => [{
                        id: Date.now(), success: false, isBroken: true, from: level, to: level, cost: costInfo,
                        time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                    }, ...prev]);
                } else if (randomVal < probs.break + probs.success) {
                    const newLevel = Math.min(MAX_LEVEL, level + 1);
                    if (newLevel === MAX_LEVEL) setIsAutoMode(false);
                    setStatus({ message: `強化成功！ (+${level} → +${newLevel})`, type: 'success' });
                    setLevel(newLevel);
                    setLogs(prev => [{
                        id: Date.now(), success: true, isBroken: false, from: level, to: newLevel, cost: costInfo,
                        time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                    }, ...prev]);
                } else {
                    let newLevel = level;
                    let currentMessage = '';
                    if (level % 5 === 0) {
                        newLevel = level;
                        currentMessage = `強化失敗... しかしLv.${level}はチェックポイントのため下がりません。`;
                    } else {
                        newLevel = Math.max(MIN_LEVEL, level - 1);
                        currentMessage = `強化失敗... (+${level} → +${newLevel})`;
                    }
                    setStatus({ message: currentMessage, type: 'error' });
                    setLevel(newLevel);
                    setLogs(prev => [{
                        id: Date.now(), success: false, isBroken: false, from: level, to: newLevel, cost: costInfo,
                        time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                    }, ...prev]);
                }
            };

            useEffect(() => {
                if (isAutoMode && level < MAX_LEVEL) {
                    autoIntervalRef.current = setInterval(() => {
                        executeEnhance();
                    }, 150);
                } else {
                    clearInterval(autoIntervalRef.current);
                }
                return () => clearInterval(autoIntervalRef.current);
            }, [isAutoMode, level, isBroken, useGemPriority, autoRepair]);

            const handleReset = () => {
                setIsAutoMode(false);
                setLevel(MIN_LEVEL);
                setIsBroken(false);
                setShowBreakDialog(false);
                setTotalGems(0);
                setTotalGold(0);
                setTotalShards(0);
                setBreakCount(0);
                setLogs([]);
                setStatus({ message: 'リセット完了', type: 'info' });
            };

            const isUsingGem = useGemPriority && getRequiredGems(level) !== null;

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col xl:flex-row items-start justify-center py-10 px-4 gap-6 font-sans">
                    
                    {/* 左：リファレンステーブル */}
                    <div className="w-full lg:w-72 xl:sticky xl:top-10 space-y-4 shrink-0">
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
                            <div className="bg-slate-700/50 p-3 flex items-center gap-2 border-b border-slate-600">
                                <Icon name="info" size={16} className="text-cyan-400" />
                                <h2 className="text-xs font-bold uppercase tracking-widest text-slate-300">強化リファレンス</h2>
                            </div>
                            <div className="overflow-x-auto max-h-[60vh] xl:max-h-[75vh] custom-scrollbar">
                                <table className="w-full text-[10px] text-left border-collapse">
                                    <thead className="sticky top-0 bg-slate-800 z-10 shadow-sm">
                                        <tr className="text-slate-500 border-b border-slate-700 font-bold uppercase tracking-tighter">
                                            <th className="p-2">Lv</th>
                                            <th className="p-2">通常消費</th>
                                            <th className="p-2 text-cyan-400">ジェム</th>
                                            <th className="p-2">成功/不能</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50">
                                        {tableData.map((row) => (
                                            <tr key={row.level} className={`transition-colors ${level === row.level ? 'bg-blue-500/20 text-blue-100 ring-inset ring-1 ring-blue-500/50' : 'hover:bg-slate-700/30 text-slate-400'}`}>
                                                <td className="p-2 font-mono font-bold">+{row.level}</td>
                                                <td className="p-2 whitespace-nowrap leading-tight">
                                                    {row.res?.gold.toLocaleString()}G<br/>
                                                    {row.res?.shards.toLocaleString()}個
                                                </td>
                                                <td className={`p-2 font-bold ${row.gem ? 'text-cyan-400' : 'text-slate-600'}`}>
                                                    {row.gem ? `${row.gem}個` : '-'}
                                                </td>
                                                <td className="p-2">
                                                    <div className="flex flex-col">
                                                        <span className="text-emerald-400 font-bold">{(row.probNormal.success * 100).toFixed(0)}%</span>
                                                        <span className={row.probNormal.break > 0 ? 'text-rose-500 font-bold' : 'text-slate-600'}>
                                                            {(row.probNormal.break * 100).toFixed(0)}%
                                                        </span>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* 中央：シミュレーター本体 */}
                    <div className="max-w-md w-full space-y-4 shrink-0">
                        
                        {showBreakDialog && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                                <div className="bg-slate-800 border-2 border-rose-500 rounded-2xl p-6 max-w-sm w-full shadow-[0_0_50px_rgba(225,29,72,0.3)] flex flex-col items-center text-center space-y-4 animate-fade-in">
                                    <div className="w-16 h-16 bg-rose-500/20 rounded-full flex items-center justify-center text-rose-500">
                                        <Icon name="alert" size={36} className="animate-pulse" />
                                    </div>
                                    <div className="space-y-2">
                                        <h2 className="text-xl font-black text-rose-500 font-mono italic">ENHANCE FAILED</h2>
                                        <p className="text-sm text-slate-300 leading-relaxed">
                                            装備が<span className="font-bold text-white">「不能」</span>状態になりました。
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => setShowBreakDialog(false)}
                                        className="w-full py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95"
                                    >
                                        了解
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="text-center space-y-0.5">
                            <h1 className="text-2xl font-black flex items-center justify-center gap-3 text-white tracking-tight">
                                <Icon name="sword" className="text-amber-500" size={28} />
                                亀裂装備強化シミュレーター
                            </h1>
                            <p className="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] italic">
                                Rift Equipment Enhance Simulator
                            </p>
                        </div>

                        {/* コスト統計 */}
                        <div className="grid grid-cols-4 gap-2">
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center">
                                <div className="flex items-center gap-1 text-cyan-400 text-[8px] font-bold uppercase tracking-wider"><Icon name="gem" size={10} /> Gems</div>
                                <div className="text-white font-mono text-xs">{totalGems.toLocaleString()}</div>
                            </div>
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center">
                                <div className="flex items-center gap-1 text-amber-400 text-[8px] font-bold uppercase tracking-wider"><Icon name="coins" size={10} /> Gold</div>
                                <div className="text-white font-mono text-xs">{totalGold.toLocaleString()}</div>
                            </div>
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center">
                                <div className="flex items-center gap-1 text-purple-400 text-[8px] font-bold uppercase tracking-wider"><Icon name="layers" size={10} /> Shards</div>
                                <div className="text-white font-mono text-xs">{totalShards.toLocaleString()}</div>
                            </div>
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center">
                                <div className="flex items-center gap-1 text-rose-500 text-[8px] font-bold uppercase tracking-wider"><Icon name="skull" size={10} /> Breaks</div>
                                <div className="text-rose-400 font-mono text-xs font-bold">{breakCount.toLocaleString()}</div>
                            </div>
                        </div>

                        {/* メインディスプレイ */}
                        <div className={`bg-slate-800 rounded-2xl p-6 shadow-xl border-2 transition-colors relative overflow-hidden ${isBroken ? 'border-rose-600/50 shadow-[inset_0_0_20px_rgba(225,29,72,0.1)]' : 'border-slate-700'}`}>
                            {isBroken && (
                                <div className="absolute inset-0 bg-rose-950/20 backdrop-blur-[1px] flex items-center justify-center z-20">
                                    <div className="bg-rose-600 text-white px-4 py-1.5 rounded-full text-xs font-bold animate-pulse shadow-xl flex items-center gap-2 border border-rose-400/50 uppercase italic tracking-tighter">
                                        <Icon name="ban" size={14} /> Broken
                                    </div>
                                </div>
                            )}

                            <div className="flex flex-col items-center space-y-4 relative z-10">
                                <div className="text-slate-400 font-bold text-[10px] uppercase tracking-widest opacity-60">Current Level</div>
                                <div className={`text-7xl font-black tabular-nums tracking-tighter transition-all duration-300 ${isAnimating ? 'scale-110' : 'scale-100'} ${
                                    isBroken ? 'text-rose-500' : level === MAX_LEVEL ? 'text-amber-400' : 'text-white'
                                }`}>
                                    +{level}
                                </div>
                                <div className="w-full pt-2 space-y-1">
                                    <div className="flex justify-between text-[10px] text-slate-500 font-bold uppercase">
                                        <span>Lv.15</span>
                                        <span>Lv.40 MAX</span>
                                    </div>
                                    <div className="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-700">
                                        <div 
                                            className={`h-full transition-all duration-500 ease-out ${isBroken ? 'bg-rose-800' : level === MAX_LEVEL ? 'bg-amber-400' : 'bg-blue-500'}`}
                                            style={{ width: `${((level - MIN_LEVEL) / (MAX_LEVEL - MIN_LEVEL)) * 100}%` }}
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 操作オプション */}
                        <div className="grid grid-cols-1 gap-2">
                            <div className="bg-slate-800/80 border border-slate-700 p-3 rounded-xl">
                                <label className="flex items-center justify-between cursor-pointer group select-none" onClick={() => setUseGemPriority(!useGemPriority)}>
                                    <div className="flex items-center gap-3">
                                        <div className={`transition-colors ${useGemPriority ? 'text-cyan-400' : 'text-slate-500'}`}>
                                            <Icon name={useGemPriority ? "check" : "circle"} size={20} />
                                        </div>
                                        <span className={`text-sm font-bold transition-colors ${useGemPriority ? 'text-white' : 'text-slate-400'}`}>
                                            ジェムを優先使用する
                                        </span>
                                    </div>
                                    <Icon name="gem" size={18} className={useGemPriority ? 'text-cyan-500 animate-pulse' : 'text-slate-600'} />
                                </label>
                            </div>

                            <div className={`bg-slate-800/80 border p-3 rounded-xl transition-all ${isAutoMode ? 'border-emerald-500/50 bg-emerald-900/10' : 'border-slate-700'}`}>
                                <label className="flex items-center justify-between cursor-pointer group select-none mb-3" onClick={() => setIsAutoMode(!isAutoMode)}>
                                    <div className="flex items-center gap-3">
                                        <div className={`transition-colors ${isAutoMode ? 'text-emerald-400' : 'text-slate-500'}`}>
                                            <Icon name={isAutoMode ? "check" : "circle"} size={20} />
                                        </div>
                                        <span className={`text-sm font-bold transition-colors ${isAutoMode ? 'text-white' : 'text-slate-400'}`}>
                                            自動強化モード (高速実行)
                                        </span>
                                    </div>
                                    <Icon name={isAutoMode ? "play" : "square"} size={18} className={isAutoMode ? "text-emerald-500" : "text-slate-600"} />
                                </label>
                                
                                <div className="border-t border-slate-700/50 pt-2 px-1">
                                    <label className="flex items-center gap-3 cursor-pointer group select-none" onClick={() => setAutoRepair(!autoRepair)}>
                                        <div className={`transition-colors ${autoRepair ? 'text-amber-400' : 'text-slate-600'}`}>
                                            <Icon name={autoRepair ? "check" : "circle"} size={16} />
                                        </div>
                                        <span className={`text-[11px] font-bold transition-colors ${autoRepair ? 'text-amber-200' : 'text-slate-500'}`}>
                                            不能時に自動でLv.15にリセットして続行
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        {/* 状態メッセージ */}
                        <div className={`p-3 rounded-xl flex items-center gap-3 font-medium min-h-[54px] border transition-all ${
                            isBroken ? 'bg-rose-950/40 text-rose-300 border-rose-800/50' :
                            status.type === 'success' ? 'bg-emerald-900/30 text-emerald-300 border-emerald-800/50' :
                            status.type === 'error' ? 'bg-rose-900/30 text-rose-300 border-rose-800/50' :
                            'bg-slate-800/80 text-slate-300 border-slate-700'
                        }`}>
                            <span className="text-xs font-bold">{isBroken ? 'EQUIPMENT BROKEN' : status.message}</span>
                        </div>

                        {/* ボタンエリア */}
                        <div className="flex flex-col gap-2">
                            {isBroken ? (
                                <button onClick={handleRepair} className="w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98] border-2 shadow-2xl bg-gradient-to-r from-orange-600 to-rose-600 border-orange-400 text-white">
                                    <Icon name="wrench" size={20} /> 不能解除 (Lv.15に戻る)
                                </button>
                            ) : (
                                <button 
                                    onClick={executeEnhance} 
                                    disabled={level >= MAX_LEVEL || isAutoMode}
                                    className={`w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98] border-2 shadow-2xl ${
                                        level >= MAX_LEVEL || isAutoMode ? 'bg-slate-800 border-slate-700 text-slate-600 opacity-60' : 
                                        isUsingGem ? 'bg-gradient-to-r from-cyan-600 to-blue-600 border-cyan-400 text-white' : 'bg-gradient-to-r from-slate-700 to-slate-800 border-amber-500/50 text-white'
                                    }`}
                                >
                                    {isAutoMode ? <Icon name="play" className="animate-pulse" /> : isUsingGem ? <Icon name="gem" /> : <Icon name="coins" />}
                                    <span className="text-lg uppercase tracking-wider font-black">{isAutoMode ? 'AUTO ENHANCING...' : level >= MAX_LEVEL ? 'MAX LEVEL' : '強化を実行'}</span>
                                </button>
                            )}
                            <button onClick={handleReset} className="w-full bg-slate-800/30 hover:bg-slate-800 text-slate-600 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all active:scale-95 border border-slate-700/50 text-xs mt-2">
                                <Icon name="rotate" size={14} /> データをリセット
                            </button>
                        </div>

                        {/* ログ */}
                        <div className="bg-slate-800/80 rounded-xl p-4 border border-slate-700 shadow-inner h-48 flex flex-col">
                            <h3 className="text-slate-400 font-bold mb-2 flex justify-between items-center text-[10px] uppercase tracking-widest">
                                <span>Enhance Log</span>
                                <span className="bg-slate-700 px-2 py-0.5 rounded text-slate-300 font-mono">{logs.length}</span>
                            </h3>
                            <div className="flex-1 overflow-y-auto space-y-1 pr-1 custom-scrollbar text-[10px]">
                                {logs.length === 0 ? <div className="h-full flex items-center justify-center text-slate-500 italic">ログはありません</div> :
                                    logs.map((log) => (
                                        <div key={log.id} className={`flex items-center justify-between p-1.5 rounded bg-slate-900/60 border ${log.isBroken ? 'border-rose-900/50' : 'border-slate-800'}`}>
                                            <div className="flex items-center gap-1.5">
                                                <span className={log.isBroken ? 'text-rose-500 font-bold' : log.success ? 'text-emerald-400' : log.message ? 'text-blue-400' : 'text-rose-400'}>
                                                    {log.isBroken ? '不能' : log.success ? '成功' : log.message ? '解除' : '失敗'}
                                                </span>
                                                <span className="text-slate-500 font-mono">{log.isBroken ? `+${log.from} !!` : log.message ? `Lv.${MIN_LEVEL}` : `+${log.from} → +${log.to}`}</span>
                                            </div>
                                            <span className="text-[8px] text-slate-600">{log.cost || log.time}</span>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    </div>

                    {/* 右：解説セクション */}
                    <div className="w-full lg:w-72 xl:sticky xl:top-10 space-y-4 shrink-0">
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl p-5 space-y-5">
                            <div className="flex items-center gap-2 border-b border-slate-700 pb-3">
                                <Icon name="book" size={18} className="text-amber-500" />
                                <h2 className="text-sm font-black uppercase tracking-widest text-slate-100">強化システムの解説</h2>
                            </div>
                            <div className="space-y-4">
                                <section className="space-y-2">
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-tighter"><Icon name="target" size={12} className="text-blue-400" /> 基本ルール</div>
                                    <ul className="text-xs text-slate-300 space-y-2 list-none">
                                        <li className="flex gap-2"><span>・</span>Lv.15~40まで。</li>
                                        <li className="flex gap-2"><span>・</span>成功で+1、失敗で-1。</li>
                                        <li className="flex gap-2"><span>・</span>5の倍数レベルは失敗しても下がりません。</li>
                                    </ul>
                                </section>
                                <section className="space-y-2 bg-rose-500/5 p-3 rounded-xl border border-rose-500/20">
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-rose-400 uppercase tracking-tighter"><Icon name="skull" size={12} /> 不能について</div>
                                    <p className="text-xs text-slate-400">通常強化時に低確率で発生。Lv.15にリセットされます。</p>
                                </section>
                                <section className="space-y-2 bg-cyan-500/5 p-3 rounded-xl border border-cyan-500/20">
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-cyan-400 uppercase tracking-tighter"><Icon name="gem" size={12} /> ジェム強化</div>
                                    <p className="text-xs text-slate-400">Lv.20~32で使用可能。<span className="text-white font-bold">不能確率が0%</span>になります。</p>
                                </section>
                            </div>
                            <div className="pt-4 border-t border-slate-700/50 flex items-center justify-between">
                                <div className="flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center border border-slate-600"><Icon name="user" size={14} className="text-slate-400" /></div><span className="text-[10px] font-bold text-slate-300">@meiteiFox</span></div>
                                <div className="text-[9px] text-slate-600 font-mono">v1.3.1</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
