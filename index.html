<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亀裂装備強化シミュレーター</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.4);
            border-radius: 10px;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Lucide Icon Component Wrapper
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconContent, setIconContent] = useState("");
            
            useEffect(() => {
                if (window.lucide) {
                    const iconElement = window.lucide.icons[name];
                    if (iconElement) {
                        // SVG generation fallback for simplicity in one-file demo
                    }
                }
            }, [name]);

            // Simplified SVG Icons for the standalone version to ensure they work without complex loading
            const icons = {
                Sword: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"></polyline><line x1="13" y1="19" x2="19" y2="13"></line><line x1="16" y1="16" x2="20" y2="20"></line><line x1="19" y1="21" x2="20" y2="20"></line><line x1="21" y1="19" x2="20" y2="20"></line></svg>,
                ArrowUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m5 12 7-7 7 7"></path><path d="M12 19V5"></path></svg>,
                ArrowDown: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"></path><path d="m19 12-7 7-7-7"></path></svg>,
                RotateCcw: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
                ShieldAlert: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>,
                Sparkles: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>,
                AlertCircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
                Coins: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path><path d="M7 6h1v4"></path><path d="m16.71 13.88.7.71-2.82 2.82"></path></svg>,
                Gem: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 3h12l4 6-10 12L2 9Z"></path><path d="M11 3 8 9l3 12"></path><path d="M13 3l3 6-3 12"></path><path d="M2 9h20"></path></svg>,
                Layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"></path><path d="m2.2 12.91 8.94 4.06a2 2 0 0 0 1.71 0l8.94-4.06"></path><path d="m2.2 17.91 8.94 4.06a2 2 0 0 0 1.71 0l8.94-4.06"></path></svg>,
                CheckCircle2: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>,
                Circle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle></svg>,
                Ban: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m4.9 4.9 14.2 14.2"></path></svg>,
                Wrench: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>,
                AlertTriangle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>,
                Play: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
                Square: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect></svg>,
                Info: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>,
                ChevronRight: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>,
                BookOpen: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
                User: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
                Target: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
            };
            
            return icons[name] || null;
        };

        function App() {
            const MIN_LEVEL = 15;
            const MAX_LEVEL = 40;

            const [level, setLevel] = useState(MIN_LEVEL);
            const [isBroken, setIsBroken] = useState(false); 
            const [showBreakDialog, setShowBreakDialog] = useState(false);
            const [useGemPriority, setUseGemPriority] = useState(true);
            const [isAutoMode, setIsAutoMode] = useState(false);
            const [totalGems, setTotalGems] = useState(0);
            const [totalGold, setTotalGold] = useState(0);
            const [totalShards, setTotalShards] = useState(0);
            const [logs, setLogs] = useState([]);
            const [status, setStatus] = useState({ message: '亀裂装備を強化してレベルを上げよう！', type: 'info' });
            const [isAnimating, setIsAnimating] = useState(false);

            const autoIntervalRef = useRef(null);

            const getProbabilities = (currentLevel, isGem) => {
                if (isGem) {
                    if (currentLevel >= 20 && currentLevel <= 24) return { success: 0.50, fail: 0.50, break: 0 };
                    if (currentLevel >= 25 && currentLevel <= 29) return { success: 0.40, fail: 0.60, break: 0 };
                    if (currentLevel >= 30 && currentLevel <= 32) return { success: 0.30, fail: 0.70, break: 0 };
                    return { success: 0, fail: 1, break: 0 };
                } else {
                    if (currentLevel >= 15 && currentLevel <= 19) return { success: 0.60, fail: 0.40, break: 0 };
                    if (currentLevel >= 20 && currentLevel <= 24) return { success: 0.50, fail: 0.48, break: 0.02 };
                    if (currentLevel >= 25 && currentLevel <= 29) return { success: 0.40, fail: 0.57, break: 0.03 };
                    if (currentLevel >= 30 && currentLevel <= 34) return { success: 0.30, fail: 0.66, break: 0.04 };
                    if (currentLevel >= 35 && currentLevel <= 39) return { success: 0.25, fail: 0.70, break: 0.05 };
                    return { success: 0, fail: 1, break: 0 };
                }
            };

            const getRequiredGems = (currentLevel) => {
                if (currentLevel >= 20 && currentLevel <= 24) return 10;
                if (currentLevel >= 25 && currentLevel <= 29) return 15;
                if (currentLevel >= 30 && currentLevel <= 32) return 30;
                return null;
            };

            const getRequiredGoldAndShards = (currentLevel) => {
                if (currentLevel >= 15 && currentLevel <= 19) return { gold: 350 + (currentLevel - 15) * 70, shards: 70 + (currentLevel - 15) * 14 };
                if (currentLevel >= 20 && currentLevel <= 24) return { gold: 1225 + (currentLevel - 20) * 175, shards: 245 + (currentLevel - 20) * 35 };
                if (currentLevel >= 25 && currentLevel <= 29) return { gold: 2450 + (currentLevel - 25) * 175, shards: 490 + (currentLevel - 25) * 35 };
                if (currentLevel >= 30 && currentLevel <= 34) return { gold: 4200 + (currentLevel - 30) * 175, shards: 840 + (currentLevel - 30) * 35 };
                if (currentLevel >= 35 && currentLevel <= 39) return { gold: 6300 + (currentLevel - 35) * 175, shards: 1260 + (currentLevel - 35) * 35 };
                return null;
            };

            const tableData = [];
            for (let i = 15; i < 40; i++) {
                const gem = getRequiredGems(i);
                const res = getRequiredGoldAndShards(i);
                const probNormal = getProbabilities(i, false);
                const probGem = getProbabilities(i, true);
                tableData.push({ level: i, gem, res, probNormal, probGem });
            }

            const executeEnhance = () => {
                if (level >= MAX_LEVEL || isBroken) {
                    setIsAutoMode(false);
                    return;
                }

                const currentGemCost = getRequiredGems(level);
                const currentResCosts = getRequiredGoldAndShards(level);
                const currentlyUsingGem = useGemPriority && currentGemCost !== null;

                let costInfo = '';
                if (currentlyUsingGem) {
                    setTotalGems(prev => prev + currentGemCost);
                    costInfo = `${currentGemCost}ジェム`;
                } else {
                    if (currentResCosts === null) {
                        setIsAutoMode(false);
                        return;
                    }
                    setTotalGold(prev => prev + currentResCosts.gold);
                    setTotalShards(prev => prev + currentResCosts.shards);
                    costInfo = `${currentResCosts.gold.toLocaleString()}G / ${currentResCosts.shards.toLocaleString()}欠片`;
                }

                setIsAnimating(true);
                setTimeout(() => setIsAnimating(false), 150);

                const probs = getProbabilities(level, currentlyUsingGem);
                const randomVal = Math.random();
                
                if (randomVal < probs.break) {
                    setIsBroken(true);
                    setShowBreakDialog(true);
                    setIsAutoMode(false);
                    setStatus({ message: '警告：装備が「不能」状態になりました！', type: 'broken' });
                    setLogs(prev => [{
                        id: Date.now(), success: false, isBroken: true, from: level, to: level, cost: costInfo,
                        time: new Date().toLocaleTimeString()
                    }, ...prev]);
                } else if (randomVal < probs.break + probs.success) {
                    const newLevel = Math.min(MAX_LEVEL, level + 1);
                    if (newLevel === MAX_LEVEL) setIsAutoMode(false);
                    setStatus({ message: `強化成功！ (+${level} → +${newLevel})`, type: 'success' });
                    setLevel(newLevel);
                    setLogs(prev => [{
                        id: Date.now(), success: true, isBroken: false, from: level, to: newLevel, cost: costInfo,
                        time: new Date().toLocaleTimeString()
                    }, ...prev]);
                } else {
                    let newLevel = level;
                    let currentMessage = '';
                    if (level % 5 === 0) {
                        newLevel = level;
                        currentMessage = `強化失敗... しかしLv.${level}はチェックポイントのため下がりません。`;
                    } else {
                        newLevel = Math.max(MIN_LEVEL, level - 1);
                        currentMessage = `強化失敗... (+${level} → +${newLevel})`;
                    }
                    setStatus({ message: currentMessage, type: 'error' });
                    setLevel(newLevel);
                    setLogs(prev => [{
                        id: Date.now(), success: false, isBroken: false, from: level, to: newLevel, cost: costInfo,
                        time: new Date().toLocaleTimeString()
                    }, ...prev]);
                }
            };

            useEffect(() => {
                if (isAutoMode && !isBroken && level < MAX_LEVEL) {
                    autoIntervalRef.current = setInterval(() => {
                        executeEnhance();
                    }, 180);
                } else {
                    clearInterval(autoIntervalRef.current);
                }
                return () => clearInterval(autoIntervalRef.current);
            }, [isAutoMode, level, isBroken, useGemPriority]);

            const handleRepair = () => {
                setIsBroken(false);
                setLevel(MIN_LEVEL);
                setStatus({ message: '不能状態を解除しました。Lv.15に戻ります。', type: 'info' });
                setLogs(prev => [{
                    id: Date.now(), type: 'repair', message: '不能解除 (Lv.15リセット)',
                    time: new Date().toLocaleTimeString()
                }, ...prev]);
            };

            const handleReset = () => {
                setIsAutoMode(false);
                setLevel(MIN_LEVEL);
                setIsBroken(false);
                setShowBreakDialog(false);
                setTotalGems(0);
                setTotalGold(0);
                setTotalShards(0);
                setLogs([]);
                setStatus({ message: 'リセット完了', type: 'info' });
            };

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col xl:flex-row items-start justify-center py-10 px-4 gap-6 font-sans">
                    
                    {/* Left Reference Table */}
                    <div className="w-full lg:w-72 xl:sticky xl:top-10 space-y-4 shrink-0">
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
                            <div className="bg-slate-700/50 p-3 flex items-center gap-2 border-b border-slate-600">
                                <Icon name="Info" size={16} className="text-cyan-400" />
                                <h2 className="text-xs font-bold uppercase tracking-widest text-slate-300">強化リファレンス</h2>
                            </div>
                            <div className="overflow-x-auto max-h-[60vh] xl:max-h-[75vh] custom-scrollbar">
                                <table className="w-full text-[10px] text-left border-collapse">
                                    <thead className="sticky top-0 bg-slate-800 z-10 shadow-sm">
                                        <tr className="text-slate-500 border-b border-slate-700 font-bold uppercase tracking-tighter">
                                            <th className="p-2">Lv</th>
                                            <th className="p-2">通常消費</th>
                                            <th className="p-2 text-cyan-400">ジェム</th>
                                            <th className="p-2">成功/不能</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50">
                                        {tableData.map((row) => (
                                            <tr key={row.level} className={`transition-colors ${level === row.level ? 'bg-blue-500/20 text-blue-100 ring-inset ring-1 ring-blue-500/50' : 'hover:bg-slate-700/30 text-slate-400'}`}>
                                                <td className="p-2 font-mono font-bold">+{row.level}</td>
                                                <td className="p-2 whitespace-nowrap leading-tight">
                                                    {row.res?.gold.toLocaleString()}G<br/>
                                                    {row.res?.shards.toLocaleString()}個
                                                </td>
                                                <td className={`p-2 font-bold ${row.gem ? 'text-cyan-400' : 'text-slate-600'}`}>
                                                    {row.gem ? `${row.gem}個` : '-'}
                                                </td>
                                                <td className="p-2">
                                                    <div className="flex flex-col">
                                                        <span className="text-emerald-400 font-bold">{(row.probNormal.success * 100).toFixed(0)}%</span>
                                                        <span className={row.probNormal.break > 0 ? 'text-rose-500 font-bold' : 'text-slate-600'}>
                                                            {(row.probNormal.break * 100).toFixed(0)}%
                                                        </span>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Main Simulator Area */}
                    <div className="max-w-md w-full space-y-4 shrink-0">
                        {showBreakDialog && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in duration-300">
                                <div className="bg-slate-800 border-2 border-rose-500 rounded-2xl p-6 max-w-sm w-full shadow-[0_0_50px_rgba(225,29,72,0.3)] flex flex-col items-center text-center space-y-4 animate-in zoom-in-95 duration-200">
                                    <div className="w-16 h-16 bg-rose-500/20 rounded-full flex items-center justify-center text-rose-500">
                                        <Icon name="AlertTriangle" size={36} className="animate-pulse" />
                                    </div>
                                    <div className="space-y-2">
                                        <h2 className="text-xl font-black text-rose-500 font-mono italic">ENHANCE FAILED</h2>
                                        <p className="text-sm text-slate-300 leading-relaxed">
                                            装備が<span className="font-bold text-white">「不能」</span>状態になりました。
                                        </p>
                                    </div>
                                    <button onClick={() => setShowBreakDialog(false)} className="w-full py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95">了解</button>
                                </div>
                            </div>
                        )}

                        <div className="text-center space-y-0.5">
                            <h1 className="text-2xl font-black flex items-center justify-center gap-3 text-white tracking-tight">
                                <Icon name="Sword" size={28} className="text-amber-500" />
                                亀裂装備強化シミュレーター
                            </h1>
                            <p className="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] italic">Rift Equipment Enhance Simulator</p>
                        </div>

                        <div className="grid grid-cols-3 gap-2">
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center text-center">
                                <div className="flex items-center gap-1 text-cyan-400 text-[9px] font-bold uppercase tracking-wider"><Icon name="Gem" size={10} /> Gems</div>
                                <div className="text-white font-mono text-sm">{totalGems.toLocaleString()}</div>
                            </div>
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center text-center">
                                <div className="flex items-center gap-1 text-amber-400 text-[9px] font-bold uppercase tracking-wider"><Icon name="Coins" size={10} /> Gold</div>
                                <div className="text-white font-mono text-sm">{totalGold.toLocaleString()}</div>
                            </div>
                            <div className="bg-slate-800/50 border border-slate-700 p-2 rounded-xl flex flex-col items-center text-center">
                                <div className="flex items-center gap-1 text-purple-400 text-[9px] font-bold uppercase tracking-wider"><Icon name="Layers" size={10} /> Shards</div>
                                <div className="text-white font-mono text-sm">{totalShards.toLocaleString()}</div>
                            </div>
                        </div>

                        <div className={`bg-slate-800 rounded-2xl p-6 shadow-xl border-2 transition-colors relative overflow-hidden ${isBroken ? 'border-rose-600/50 shadow-[inset_0_0_20px_rgba(225,29,72,0.1)]' : 'border-slate-700'}`}>
                            {isBroken && (
                                <div className="absolute inset-0 bg-rose-950/20 backdrop-blur-[1px] flex items-center justify-center z-20">
                                    <div className="bg-rose-600 text-white px-4 py-1.5 rounded-full text-xs font-bold animate-pulse shadow-xl flex items-center gap-2 border border-rose-400/50 uppercase italic tracking-tighter">
                                        <Icon name="Ban" size={14} /> Broken
                                    </div>
                                </div>
                            )}
                            <div className="flex flex-col items-center space-y-4 relative z-10">
                                <div className="text-slate-400 font-bold text-[10px] uppercase tracking-widest opacity-60">Current Level</div>
                                <div className={`text-7xl font-black tabular-nums tracking-tighter transition-all duration-300 ${isAnimating ? 'scale-110' : 'scale-100'} ${isBroken ? 'text-rose-500' : level === MAX_LEVEL ? 'text-amber-400 drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]' : 'text-white'}`}>
                                    +{level}
                                </div>
                                <div className="w-full pt-2 space-y-1">
                                    <div className="flex justify-between text-[10px] text-slate-500 font-bold uppercase"><span>Lv.15</span><span>Lv.40 MAX</span></div>
                                    <div className="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-700">
                                        <div className={`h-full transition-all duration-500 ease-out ${isBroken ? 'bg-rose-800' : level === MAX_LEVEL ? 'bg-amber-400' : 'bg-blue-500'}`} style={{ width: `${((level - MIN_LEVEL) / (MAX_LEVEL - MIN_LEVEL)) * 100}%` }} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {!isBroken && (
                            <div className="grid grid-cols-1 gap-2">
                                <div className="bg-slate-800/80 border border-slate-700 p-3 rounded-xl">
                                    <label className="flex items-center justify-between cursor-pointer group select-none" onClick={() => setUseGemPriority(!useGemPriority)}>
                                        <div className="flex items-center gap-3">
                                            <div className={`transition-colors ${useGemPriority ? 'text-cyan-400' : 'text-slate-500'}`}>{useGemPriority ? <Icon name="CheckCircle2" /> : <Icon name="Circle" />}</div>
                                            <span className={`text-sm font-bold transition-colors ${useGemPriority ? 'text-white' : 'text-slate-400'}`}>ジェムを優先使用する</span>
                                        </div>
                                        <Icon name="Gem" size={18} className={useGemPriority ? 'text-cyan-500 animate-pulse' : 'text-slate-600'} />
                                    </label>
                                </div>
                                <div className={`bg-slate-800/80 border p-3 rounded-xl transition-all ${isAutoMode ? 'border-emerald-500/50 bg-emerald-900/10' : 'border-slate-700'}`}>
                                    <label className="flex items-center justify-between cursor-pointer group select-none" onClick={() => setIsAutoMode(!isAutoMode)}>
                                        <div className="flex items-center gap-3">
                                            <div className={`transition-colors ${isAutoMode ? 'text-emerald-400' : 'text-slate-500'}`}>{isAutoMode ? <Icon name="CheckCircle2" /> : <Icon name="Circle" />}</div>
                                            <span className={`text-sm font-bold transition-colors ${isAutoMode ? 'text-white' : 'text-slate-400'}`}>自動強化モード (高速実行)</span>
                                        </div>
                                        {isAutoMode ? <Icon name="Play" size={18} className="text-emerald-500 animate-ping" /> : <Icon name="Square" size={18} className="text-slate-600" />}
                                    </label>
                                </div>
                            </div>
                        )}

                        <div className={`p-3 rounded-xl flex items-center gap-3 font-medium min-h-[54px] border transition-all ${isBroken ? 'bg-rose-950/40 text-rose-300 border-rose-800/50' : status.type === 'success' ? 'bg-emerald-900/30 text-emerald-300 border-emerald-800/50' : status.type === 'error' ? 'bg-rose-900/30 text-rose-300 border-rose-800/50' : status.type === 'warning' ? 'bg-amber-900/30 text-amber-300 border-amber-800/50' : 'bg-slate-800/80 text-slate-300 border-slate-700'}`}>
                            <span className="text-xs font-bold">{isBroken ? 'EQUIPMENT BROKEN' : status.message}</span>
                        </div>

                        <div className="flex flex-col gap-2">
                            {isBroken ? (
                                <button onClick={handleRepair} className="w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98] border-2 shadow-2xl bg-gradient-to-r from-orange-600 to-rose-600 border-orange-400 text-white">
                                    <Icon name="Wrench" /> 不能解除 (Lv.15に戻る)
                                </button>
                            ) : (
                                <button onClick={executeEnhance} disabled={level >= MAX_LEVEL || isAutoMode} className={`w-full py-4 rounded-xl font-bold flex flex-col items-center justify-center transition-all active:scale-[0.98] border-2 shadow-2xl ${level >= MAX_LEVEL || isAutoMode ? 'bg-slate-800 border-slate-700 text-slate-600 cursor-not-allowed opacity-60' : 'bg-slate-700 hover:bg-slate-600 border-white/20 text-white'}`}>
                                    <div className="flex items-center gap-2 text-lg uppercase tracking-wider font-black">
                                        {isAutoMode ? (<><Icon name="Play" className="animate-pulse" /> AUTO ENHANCING...</>) : (<>{level >= MAX_LEVEL ? 'MAX LEVEL' : '強化を実行'}</>)}
                                    </div>
                                </button>
                            )}
                            <button onClick={handleReset} className="w-full bg-slate-800/30 hover:bg-slate-800 text-slate-600 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all active:scale-95 border border-slate-700/50 text-xs mt-2"><Icon name="RotateCcw" size={14} /> データをリセット</button>
                        </div>

                        <div className="bg-slate-800/80 rounded-xl p-4 border border-slate-700 shadow-inner h-48 flex flex-col">
                            <h3 className="text-slate-400 font-bold mb-2 flex justify-between items-center text-[10px] uppercase tracking-widest"><span>Enhance Log</span><span className="bg-slate-700 px-2 py-0.5 rounded text-slate-300 font-mono">{logs.length}</span></h3>
                            <div className="flex-1 overflow-y-auto space-y-1 pr-1 custom-scrollbar text-[10px]">
                                {logs.length === 0 ? (<div className="h-full flex items-center justify-center text-slate-500 italic text-[9px]">ログはありません</div>) : (logs.map((log) => (
                                    <div key={log.id} className="flex items-center justify-between p-1.5 rounded bg-slate-900/60 border border-slate-800">
                                        <div className="flex items-center gap-1.5"><span className={log.isBroken ? 'text-rose-500 font-bold' : log.success ? 'text-emerald-400' : 'text-rose-400'}>{log.isBroken ? '不能' : log.success ? '成功' : '失敗'}</span><span className="text-slate-500 font-mono">+{log.from} → {log.isBroken ? '!!' : `+${log.to}`}</span></div>
                                        <span className="text-[8px] text-slate-600">{log.cost}</span>
                                    </div>
                                )))}
                            </div>
                        </div>
                    </div>

                    {/* Right Description Section */}
                    <div className="w-full lg:w-72 xl:sticky xl:top-10 space-y-4 shrink-0">
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl p-5 space-y-5">
                            <div className="flex items-center gap-2 border-b border-slate-700 pb-3"><Icon name="BookOpen" className="text-amber-500" /><h2 className="text-sm font-black uppercase tracking-widest text-slate-100">強化システムの解説</h2></div>
                            <div className="space-y-4">
                                <section className="space-y-2">
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-tighter"><Icon name="Target" size={12} className="text-blue-400" /> 基本ルール</div>
                                    <ul className="text-xs text-slate-300 space-y-2 leading-relaxed list-none">
                                        <li className="flex gap-2"><span className="text-blue-500 font-bold">・</span>強化レベルは <span className="text-white font-bold">15</span> から開始し、最大 <span className="text-amber-400 font-bold">40</span> まで到達可能です。</li>
                                        <li className="flex gap-2"><span className="text-emerald-500 font-bold">・</span>強化<span className="text-emerald-400 font-bold">成功</span>でレベルが1上昇、<span className="text-rose-400 font-bold">失敗</span>で1下落します。</li>
                                        <li className="flex gap-2"><span className="text-cyan-400 font-bold">・</span><span className="text-white font-bold underline decoration-cyan-500/50 underline-offset-4">5の倍数</span>のレベルはチェックポイントです。失敗してもレベルは下がりません。</li>
                                    </ul>
                                </section>
                                <section className="space-y-2 bg-rose-500/5 p-3 rounded-xl border border-rose-500/20">
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-rose-400 uppercase tracking-tighter"><Icon name="AlertTriangle" size={12} /> 不能状態について</div>
                                    <p className="text-xs text-slate-400 leading-relaxed">通常強化時に低確率で<span className="text-rose-500 font-bold">「不能」</span>状態になります。この状態になると、レベル15へリセットするまで次の強化が行えません。</p>
                                </section>
                                <section className="space-y-2 bg-cyan-500/5 p-3 rounded-xl border border-cyan-500/20">
                                    <div className="flex items-center gap-2 text-[10px] font-bold text-cyan-400 uppercase tracking-tighter"><Icon name="Gem" size={12} /> ジェム強化 (Lv.20~32)</div>
                                    <p className="text-xs text-slate-400 leading-relaxed">特定のレベル帯ではジェムを消費して強化が可能です。ジェム使用時は<span className="text-white font-bold italic">不能になる確率が0%</span>になります。</p>
                                </section>
                            </div>
                            <div className="pt-4 border-t border-slate-700/50 flex items-center justify-between">
                                <div className="flex items-center gap-2 group">
                                    <div className="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center overflow-hidden border border-slate-600 group-hover:border-amber-500 transition-colors"><Icon name="User" size={14} className="text-slate-400 group-hover:text-amber-500" /></div>
                                    <div className="flex flex-col"><span className="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Creator</span><span className="text-[10px] font-bold text-slate-300">@meiteiFox</span></div>
                                </div>
                                <div className="text-[9px] text-slate-600 font-mono">v1.2.0</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
